name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        # This excludes the node_modules folder from the Python linting check
        find . -path "*/node_modules/*" -prune -o -name "*.py" -exec flake8 {} +
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        # This tells the linter to ONLY look at the .js files in your database folder
        # and ignore the deep library folders that caused the failures
        jshint ./server/database/*.js
        echo "Linted all the js files successfully"
