name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        # This excludes node_modules so flake8 doesn't get confused
        flake8 . --count --exclude=node_modules --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exclude=node_modules --max-complexity=10 --max-line-length=79 --statistics
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        # Target ONLY your files; ignore everything in node_modules
        jshint ./server/database/*.js
        echo "Linted all the js files successfully"
